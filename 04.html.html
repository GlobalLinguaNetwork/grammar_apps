<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>不定詞完全マスター - 英文リスニング</title>
  <style>
    :root {
      --primary-color: #d97706; /* 不定詞編は温かみのあるアンバー（オレンジ） */
      --accent-color: #f59e0b;
      --bg-color: #fffbeb;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #475569;
      --radius: 16px;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding-top: 140px;
      line-height: 1.6;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      z-index: 1000;
      padding: 20px 0;
      text-align: center;
    }

    h1 {
      margin: 0 0 15px 0;
      font-size: 1.3rem;
      color: var(--primary-color);
      letter-spacing: 0.05em;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 15px;
    }

    button {
      border: none;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-play-all { background: var(--primary-color); color: white; }
    .btn-stop { background: #ef4444; color: white; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }

    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 0 15px 50px;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.playing {
      border-color: var(--primary-color);
      background-color: #fffef2;
      transform: scale(1.02);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .no {
      font-size: 0.8rem;
      color: #92400e;
      background: #fef3c7;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: bold;
    }

    .btn-play-single {
      background: #fef3c7;
      color: var(--primary-color);
      padding: 6px 12px;
      font-size: 0.75rem;
    }

    .en-text {
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 10px;
      color: #0f172a;
    }

    .en-text strong {
      color: var(--primary-color);
      border-bottom: 2px solid #fde68a;
      font-weight: 700;
    }

    .details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      opacity: 0;
    }

    .card.open .details {
      max-height: 600px;
      opacity: 1;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed #e2e8f0;
    }

    .ja-text {
      font-size: 0.95rem;
      color: var(--text-sub);
      font-weight: bold;
      margin-bottom: 10px;
      display: block;
    }

    .exp-box {
      background: #fdfaf6;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #475569;
      border-left: 4px solid var(--primary-color);
    }

    .hint-badge {
      font-size: 0.7rem;
      color: #94a3b8;
      text-align: center;
      display: block;
      margin-top: 5px;
    }

    /* 完了ボタン用スタイル */
    .btn-finish-study {
      background: #10b981;
      color: white;
      width: 100%;
      max-width: 300px;
      margin: 30px auto 0;
      padding: 16px;
      font-size: 1.1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      transition: opacity 0.2s;
    }
    .btn-finish-study:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <header>
    <h1>不定詞のまとめ (全90文)</h1>
    <div class="controls">
      <button class="btn-play-all" id="playAllBtn"><span>▶</span> 連続再生</button>
      <button class="btn-stop" id="stopBtn"><span>■</span> 停止</button>
    </div>
    <span class="hint-badge">カードをクリックして和訳・ポイントを確認</span>
  </header>

  <main class="container" id="card-container">
    <!-- 追加：完了ボタン -->
    <button class="btn-finish-study" onclick="finishStudy()">✓ 学習を完了する</button>
  </main>

  <script>
    const data =[
      { no: "T-551", en: "Our plan <strong>is to climb</strong> the mountain tomorrow.", ja: "私たちの計画は、明日その山に登ることです。", exp: "【名詞的：補語】be動詞の後ろで「～することだ」と説明する。" },
      { no: "T-552", en: "My dream <strong>is to become</strong> a doctor.", ja: "私の夢は医者になることです。", exp: "【名詞的：補語】主語(My dream)の内容を説明。" },
      { no: "T-553", en: "<strong>To own</strong> a house is a dream of many Japanese.", ja: "家を持つことは、多くの日本人の夢だ。", exp: "【名詞的：主語】文頭で「～すること（は）」と主語になる形。※It is...to doに書き換え可能。" },
      { no: "T-554", en: "<strong>It is useful to have</strong> a driver's license.", ja: "運転免許を持っていると役に立つ。", exp: "【重要】形式主語 It。It is [形容詞] to do... の定番形。「～することは…だ」。" },
      { no: "T-555", en: "<strong>It was easy to answer</strong> the question.", ja: "その質問に答えるのは簡単だった。", exp: "【重要】形式主語 It。過去形の場合も同様。" },
      { no: "T-556", en: "My son <strong>needs to see</strong> a dentist.", ja: "息子は歯医者に診てもらう必要がある。", exp: "【名詞的：目的語】動詞の後ろで「～することを」必要とする。" },
      { no: "T-557", en: "Sam <strong>finds it easy to make</strong> friends.", ja: "サムは友達を作ることは簡単だと思っている。", exp: "【重要】形式目的語 it。find/think it [形容詞] to do... の形を丸暗記。" },
      { no: "T-558", en: "I'm looking for <strong>someone to help</strong> me.", ja: "私は仕事を手伝ってくれる人を探している。", exp: "【形容詞的】名詞(someone)を後ろから修飾。「～してくれる…」。" },
      { no: "T-559", en: "I have a lot of <strong>homework to do</strong>.", ja: "やるべき宿題がたくさんある。", exp: "【形容詞的】名詞(homework)が不定詞の目的語の関係。「やるべき～」。" },
      { no: "T-560", en: "Do you have <strong>anything to write with</strong>?", ja: "何か書くもの（ペンなど）を持っていますか？", exp: "【超重要】前置詞の残し。write with a pen の関係なので with が必須。" },
      { no: "T-561", en: "They were <strong>the first men to land</strong> on the moon.", ja: "彼らは月面に着陸した最初の人間だった。", exp: "【形容詞的】the first/only 等が先行する名詞を修飾する形。" },
      { no: "T-562", en: "I was surprised at her <strong>decision to become</strong> an actress.", ja: "彼女が女優になるという決断に驚いた。", exp: "【同格的】名詞(decision)の内容を不定詞で説明。「～するという決断」。" },
      { no: "T-563", en: "Whales have the <strong>ability to communicate</strong> with each other.", ja: "クジラはお互いに意思疎通をする能力を持っている。", exp: "【同格的】ability to do「～する能力」。" },
      { no: "T-564", en: "It's <strong>time to go</strong>.", ja: "もう行く時間だ。", exp: "【定番】time to do「～する時間」。" },
      { no: "T-565", en: "What is the <strong>best way to prevent</strong> cancer?", ja: "癌を予防する最良の方法は何ですか？", exp: "【定番】way to do「～する方法」。" },
      { no: "T-566", en: "She is working hard <strong>to buy</strong> a car.", ja: "彼女は車を買うために一生懸命働いている。", exp: "【副詞的：目的】「～するために」。最もよく使われる不定詞の役割。" },
      { no: "T-567", en: "I went to the library <strong>to prepare</strong> for the test.", ja: "私はテスト勉強をするために図書館へ行った。", exp: "【副詞的：目的】動作の目的を付け加える。" },

      { no: "T-570", en: "They separated, <strong>never to see</strong> each other again.", ja: "彼らは別れ、二度とお互いに会うことはなかった。", exp: "【重要：結果】「～したが、二度と…しなかった」。" },

      { no: "T-589", en: "It is difficult <strong>to find</strong> a good job.", ja: "よい仕事を見つけるのは難しい。", exp: "【意味上の主語】一般の人（誰にとっても）の場合は示さない。" },
      { no: "T-590", en: "His dream is <strong>to become</strong> a movie star.", ja: "彼の夢は映画スターになることだ。", exp: "【意味上の主語】文脈から明らかな場合は示さない。" },

      { no: "T-619", en: "The next meeting <strong>is to take place</strong> in HK.", ja: "次の会議は香港で行われる予定だ。", exp: "【be to：予定】公式な予定や計画。「～することになっている」。" },
      { no: "T-620", en: "You <strong>are to show</strong> your student ID card at the entrance.", ja: "入口で学生証を見せなければならない。", exp: "【be to：義務】「～すべきだ／～しなければならない」。" },
      { no: "T-621", en: "Not a sound <strong>was to be heard</strong>.", ja: "物音ひとつ聞こえなかった。", exp: "【be to：可能】否定文で受動態と共に使い「～できる」。" },
      { no: "T-622", en: "He <strong>was never to return</strong> to his hometown.", ja: "彼は二度と故郷に戻ることはなかった。", exp: "【be to：運命】過去形で「～する運命だった」。" },
      { no: "T-623", en: "If you <strong>are to pass</strong> the exam, study hard.", ja: "もし試験に受かりたいのなら、一生懸命勉強しなさい。", exp: "【be to：意図】If節内で「～したいと思うなら」。" },
      { no: "T-624", en: "Poetry is <strong>hard to translate</strong>.", ja: "詩は翻訳するのが難しい。", exp: "【難易】形容詞＋to do。「～するのが（難しい）。" },
      { no: "T-625", en: "Our teacher is <strong>easy to talk with</strong>.", ja: "私たちの先生は話しやすい。", exp: "【難易】talk with the teacher の関係なので with を落とさない。" },
      { no: "T-626", en: "This park is <strong>dangerous to walk in</strong> at night.", ja: "この公園は夜歩くのが危険だ。", exp: "【難易】walk in the park の関係なので in が必要。" },
      { no: "T-627", en: "This curry is <strong>too spicy for me to eat</strong>.", ja: "このカレーは私には辛すぎて食べられない。", exp: "【最重要】too...to ～「あまりに…なので～できない」。" },
      { no: "T-628", en: "She was <strong>kind enough to carry</strong> my baggage.", ja: "彼女は親切にも私の荷物を運んでくれた。", exp: "【最重要】...enough to ～「～するほど…／とても…なので～する」。" },
      { no: "T-629", en: "She was <strong>so kind as to carry</strong> my baggage.", ja: "彼女は親切にも私の荷物を運んでくれた。", exp: "【重要】so...as to ～「～するほど…」。enough to とほぼ同じ。" },
      { no: "T-630", en: "I left early <strong>so as to avoid</strong> traffic.", ja: "私は渋滞を避けるために早く出発した。", exp: "【目的】so as to / in order to は、単なる to よりも「目的」を強調する。" },
      { no: "T-631", en: "I hurried <strong>in order not to miss</strong> the train.", ja: "私は電車に乗り遅れないように急いだ。", exp: "【否定目的】in order not to do「～しないように」。" },
      { no: "T-632", en: "You should teach your children <strong>how to swim</strong>.", ja: "子供たちに泳ぎ方を教えるべきだ。", exp: "【重要】疑問詞＋to do「～のしかた／どうやって～するか」。名詞の塊になる。" },
      { no: "T-633", en: "I thought about <strong>who to invite</strong> to the party.", ja: "パーティーに誰を招待すべきか考えた。", exp: "【形】who(m) to do「誰を～すべきか」。" },
      { no: "T-634", en: "Do you know <strong>where to buy</strong> the tickets?", ja: "どこでチケットを買えばいいか知っていますか？", exp: "【形】where to do「どこで～すべきか」。" },
      { no: "T-635", en: "I don't know <strong>what to do</strong>.", ja: "何をすべきかわからない。", exp: "【形】what to do「何を～すべきか」。" },
      { no: "T-636", en: "Ask your teacher <strong>when to start</strong>.", ja: "いつ始めるべきか先生に聞きなさい。", exp: "【形】when to do「いつ～すべきか」。" },
      { no: "T-637", en: "I can't decide <strong>whether to accept</strong> his request.", ja: "彼の要求を受け入れるべきかどうか決められない。", exp: "【形】whether to do「～すべきかどうか」。" },
      { no: "T-638", en: "<strong>To tell the truth</strong>, that jacket doesn't suit you.", ja: "実を言うと、そのジャケットは君には似合っていないよ。", exp: "【独立不定詞】慣用句。to tell the truth「実を言うと」。" },
      { no: "T-639", en: "<strong>Strange to say</strong>, the missing plane was never found.", ja: "奇妙なことに、その行方不明機は二度と見つからなかった。", exp: "【独立不定詞】strange to say「奇妙なことに」。" },
      { no: "T-640", en: "\"Would you like to go to the movies?\" \"I'd love to.\"", ja: "「映画に行きませんか？」「ぜひ行きたいです。」", exp: "【代不定詞】toの後ろの重複（go）を省略。toだけを残す。" }
    ];

    const container = document.getElementById('card-container');
    const finishBtn = document.querySelector('.btn-finish-study');

    data.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = `card-${index}`;
      card.onclick = (e) => {
        if (!e.target.classList.contains('btn-play-single')) {
            card.classList.toggle('open');
        }
      };
      
      const escapedExp = item.exp.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      
      card.innerHTML = `
        <div class="card-header">
          <span class="no">${item.no}</span>
          <button class="btn-play-single" onclick="playSingle(${index})">🔊 再生</button>
        </div>
        <div class="en-text">${item.en}</div>
        <div class="details">
            <span class="ja-text">${item.ja}</span>
            <div class="exp-box">${escapedExp}</div>
        </div>
      `;
      container.insertBefore(card, finishBtn);
    });

    const synth = window.speechSynthesis;
    let currentPlayIndex = -1;
    let isPlayingAll = false;

    function stripHtml(html) {
      const tmp = document.createElement("DIV");
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || "";
    }

    function speakText(text, onEndCallback) {
      synth.cancel();
      const plainText = stripHtml(text);
      const utterance = new SpeechSynthesisUtterance(plainText);
      utterance.lang = 'en-US';
      utterance.rate = 0.85;
      utterance.onend = () => { if (onEndCallback) onEndCallback(); };
      synth.speak(utterance);
    }

    function updateHighlights(index) {
      document.querySelectorAll('.card').forEach((card, i) => {
        if (i === index) {
          card.classList.add('playing');
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
          card.classList.remove('playing');
        }
      });
    }

    function playNext() {
      if (!isPlayingAll) return;
      currentPlayIndex++;
      if (currentPlayIndex >= data.length) {
        stopAll();
        return;
      }
      updateHighlights(currentPlayIndex);
      speakText(data[currentPlayIndex].en, playNext);
    }

    function stopAll() {
      isPlayingAll = false;
      synth.cancel();
      updateHighlights(-1);
    }

    window.playSingle = function(index) {
      stopAll();
      updateHighlights(index);
      speakText(data[index].en);
    };

    document.getElementById('playAllBtn').addEventListener('click', () => {
      isPlayingAll = true;
      currentPlayIndex = -1;
      playNext();
    });

    document.getElementById('stopBtn').addEventListener('click', stopAll);

    // ==========================================
    // 追加：ページ内の全単語数を計算する関数
    // ==========================================
    function calculateTotalWords() {
      let total = 0;
      data.forEach(item => {
        // HTMLタグ（<strong>など）を除去して純粋なテキストにする
        const plainText = item.en.replace(/<\/?[^>]+(>|$)/g, " ");
        // 空白で分割して単語数をカウント
        const words = plainText.trim().split(/\s+/);
        if (words[0] !== "") {
          total += words.length;
        }
      });
      return total;
    }

    // ==========================================
    // 修正：ポータルへデータを送信する処理
    // ==========================================
    function finishStudy() {
      if (typeof stopAll === 'function') stopAll(); 
      
      var sectionName = sessionStorage.getItem('gln_grammar_current_section') || '文法プリント 学習完了';
      
      // ★実際の単語数を動的に計算
      var actualWordCount = calculateTotalWords();
      
      var payload = {
        type:   'GLN_COMPLETE',
        title:  '文法プリント',
        cat:    'Grammar',
        detail: sectionName,
        words:  actualWordCount, // 固定値600から計算値に変更
        timestamp: Date.now()
      };

      if (window.opener && !window.opener.closed) {
        window.opener.postMessage(payload, '*');
      }
      try { 
        localStorage.setItem('GLN_SYNC_PAYLOAD', JSON.stringify(payload)); 
        localStorage.setItem('gln_grammar_result', JSON.stringify({
          section: sectionName,
          timestamp: Date.now()
        }));
      } catch(e) {}
      
      alert('「' + sectionName + '」の学習完了を記録しました！\n（カウント語数: ' + actualWordCount + '語）');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
