<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>比較完全マスター - 英文リスニング</title>
  <style>
    :root {
      --primary-color: #0891b2; /* 比較編は清涼感のあるシアン（水色） */
      --accent-color: #f59e0b;
      --bg-color: #ecfeff;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #475569;
      --radius: 16px;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding-top: 140px;
      line-height: 1.6;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      z-index: 1000;
      padding: 20px 0;
      text-align: center;
    }

    h1 {
      margin: 0 0 15px 0;
      font-size: 1.3rem;
      color: var(--primary-color);
      letter-spacing: 0.05em;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 15px;
    }

    button {
      border: none;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-play-all { background: var(--primary-color); color: white; }
    .btn-stop { background: #ef4444; color: white; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }

    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 0 15px 50px;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.playing {
      border-color: var(--primary-color);
      background-color: #f0fdfa;
      transform: scale(1.02);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .no {
      font-size: 0.8rem;
      color: #0891b2;
      background: #cffafe;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .btn-play-single {
      background: #cffafe;
      color: var(--primary-color);
      padding: 6px 12px;
      font-size: 0.75rem;
    }

    .en-text {
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 10px;
      color: #0f172a;
    }

    .en-text strong {
      color: var(--primary-color);
      border-bottom: 2px solid #a5f3fc;
      font-weight: 700;
    }

    .details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      opacity: 0;
    }

    .card.open .details {
      max-height: 800px;
      opacity: 1;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed #e2e8f0;
    }

    .ja-text {
      font-size: 0.95rem;
      color: var(--text-sub);
      font-weight: bold;
      margin-bottom: 10px;
      display: block;
    }

    .exp-box {
      background: #f0f9ff;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #475569;
      border-left: 4px solid var(--primary-color);
    }

    .hint-badge {
      font-size: 0.7rem;
      color: #94a3b8;
      text-align: center;
      display: block;
      margin-top: 5px;
    }

    /* 完了ボタン用スタイル */
    .btn-finish-study {
      background: #10b981;
      color: white;
      width: 100%;
      max-width: 300px;
      margin: 30px auto 0;
      padding: 16px;
      font-size: 1.1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      transition: opacity 0.2s;
    }
    .btn-finish-study:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <header>
    <h1>比較のまとめ (全112文)</h1>
    <div class="controls">
      <button class="btn-play-all" id="playAllBtn"><span>▶</span> 連続再生</button>
      <button class="btn-stop" id="stopBtn"><span>■</span> 停止</button>
    </div>
    <span class="hint-badge">カードをクリックして和訳・ポイントを確認</span>
  </header>

  <main class="container" id="card-container">
    <!-- 追加：完了ボタン -->
    <button class="btn-finish-study" onclick="finishStudy()">✓ 学習を完了する</button>
  </main>

      { no: "T-214", en: "He worked <strong>none the harder because</strong> he became a father.", ja: "父親になったからといって、よりいっそう働くことはなかった。", exp: "【定型】none the [比較級] for/because ...。「～だからといって少しも…ない」。" },
      { no: "T-215", en: "We respect him <strong>none the less for</strong> his faults.", ja: "彼には欠点があるが、それでもやはり尊敬している。", exp: "【定型】none the less for ...。「～にもかかわらず、それでもなお」。" },
      { no: "T-146", en: "His behavior was <strong>more foolish than rude</strong>.", ja: "彼の振る舞いは無礼というよりはむしろ愚かだった。", exp: "【重要】同一人物の性質を比較する場合、短い語でも more [原級] than [原級] を使う。" },
      { no: "T-217", en: "The story was <strong>more funny than scary</strong>.", ja: "その話は怖いというよりは面白かった。", exp: "【重要】funny(er) ではなく more funny を使う。" },
      { no: "T-218", en: "He is <strong>more of</strong> a critic <strong>than</strong> a writer.", ja: "彼は作家というよりはむしろ批評家だ。", exp: "【復習】名詞の比較。" },
      { no: "T-219", en: "He can't write a simple report, <strong>much less</strong> a novel.", ja: "彼は簡単な報告書も書けない、ましてや小説などはなおさらだ。", exp: "【重要】否定文, much [still] less ...。「まして～はなおさらない」。" },
      { no: "T-220", en: "Humans are <strong>superior to</strong> gorillas in intelligence.", ja: "人間は知能の点でゴリラより優れている。", exp: "【ラテン比較】superior to ～。「～より優れている」。than は使わない。" },
      { no: "T-221", en: "I am <strong>inferior to</strong> him in Math.", ja: "私は数学において彼より劣っている。", exp: "【ラテン比較】inferior to ～。「～より劣っている」。" },
      { no: "T-222", en: "John is <strong>senior to</strong> Robert.", ja: "ジョンはロバートより年上だ。", exp: "【ラテン比較】senior to ～。「～より年上だ」。" },
      { no: "T-223", en: "He is <strong>my senior by</strong> six years.", ja: "彼は私より 6 歳年上だ。", exp: "【名詞】senior「年上の人」。" },
      { no: "T-224", en: "Robert is <strong>junior to</strong> John.", ja: "ロバートはジョンより年下だ。", exp: "【ラテン比較】junior to ～。「～より年下だ」。" },
      { no: "T-225", en: "She is one year <strong>my junior</strong>.", ja: "彼女は私の 1 歳年下だ。", exp: "【名詞】junior「年下の人」。" },
      { no: "T-226", en: "I <strong>prefer</strong> playing sports <strong>to</strong> watching them.", ja: "私はスポーツを見るよりもする方が好きだ。", exp: "【重要】prefer A to B。「BよりAを好む」。" },
      { no: "T-227", en: "Our guess was <strong>more or less</strong> correct.", ja: "私たちの推測はだいたい当たっていた。", exp: "【定型】more or less「多かれ少なかれ、だいたい」。" },
      { no: "T-228", en: "<strong>Sooner or later</strong> you will find a good solution.", ja: "遅かれ早かれ、君はよい解決策を見つけるだろう。", exp: "【定型】sooner or later「遅かれ早かれ」。" },
      { no: "T-229", en: "I <strong>know better than to go</strong> sailing without a life jacket.", ja: "私は救命胴衣なしで海に出るほど愚かではない。", exp: "【重要】know better than to do。「～するほど馬鹿ではない（分別がある）」。" },
      { no: "T-230", en: "The video camera is <strong>no bigger than</strong> my hand.", ja: "そのカメラは私の手と同じくらいの大きさしかない。", exp: "【難関：クジラ】no [比較級] than ...。差がゼロ(no)であることを強調し、意外に小さい（only）というニュアンス。" },
      { no: "T-231", en: "Saying nothing is <strong>no better than</strong> telling a lie.", ja: "何も言わないのは嘘をつくのと同様によくない。", exp: "【クジラ】no better than ～「～も同然だ」。" },
      { no: "T-232", en: "Sleeping too much is <strong>no more</strong> healthy <strong>than</strong> eating too much <strong>is</strong>.", ja: "寝すぎるのは、食べ過ぎるのと同様に健康的ではない。", exp: "【最重要：クジラの公式】A is no more B than C is (D)。「CがDでないのと同様にAはBではない」。両方を強く否定。" },
      { no: "T-233", en: "He is <strong>not any more</strong> popular <strong>than</strong> you are.", ja: "彼は君と同様に人気がない。", exp: "【言い換え】not any more than = no more than。" },
      { no: "T-234", en: "He is <strong>not</strong> popular <strong>any more than</strong> you are.", ja: "彼も君と同様に人気がない。", exp: "【言い換え】文構造に注意。" },
      { no: "T-235", en: "Relaxing is <strong>no less</strong> important <strong>than</strong> working <strong>is</strong>.", ja: "リラックスすることは、働くことと同様に重要だ。", exp: "【最重要：クジラの公式】A is no less B than C is (D)。「CがDであるのと同様にAはBである（AはCに劣らずBだ）」。両方を強く肯定。" },
      { no: "T-236", en: "He is <strong>no more</strong> a genius <strong>than</strong> I am.", ja: "私が天才でないのと同様に、彼も天才ではない。", exp: "【復習】no more A than B。" },
      { no: "T-237", en: "Julia can <strong>no less</strong> sail a yacht <strong>than</strong> Steve can.", ja: "スティーブがヨットを操縦できるのと同様に、ジュリアもできる。", exp: "【復習】no less ... than。" },
      { no: "T-238", en: "He paid me <strong>no more than</strong> 3,000 yen.", ja: "彼は私にたった 3,000 円しか払わなかった。", exp: "【重要】no more than [数] = only。「たったの～」。" },
      { no: "T-239", en: "He paid me <strong>not more than</strong> 3,000 yen.", ja: "彼はせいぜい 3,000 円しか払わなかった。", exp: "【重要】not more than [数] = at most。「せいぜい～、多くても～」。" },
      { no: "T-240", en: "There were <strong>not more than</strong> twenty people in the theater.", ja: "劇場にはせいぜい 20 人しかいなかった。", exp: "【復習】not more than = at most。" },
      { no: "T-241", en: "There were <strong>at most</strong> twenty people in the theater.", ja: "劇場にはせいぜい 20 人しかいなかった。", exp: "【言い換え】at most「せいぜい」。" },
      { no: "T-242", en: "There were <strong>no more than</strong> twenty people in the theater.", ja: "劇場にはたった 20 人しかいなかった。", exp: "【復習】no more than = only。" },
      { no: "T-243", en: "She paid me <strong>no less than</strong> 30,000 yen.", ja: "彼女は 3 万円も払ってくれた。", exp: "【重要】no less than [数] = as many/much as。「～もの（多さの強調）」。" },
      { no: "T-244", en: "She paid me <strong>as much as</strong> 30,000 yen.", ja: "彼女は 3 万円も払ってくれた。", exp: "【復習】as much as「～もの」。" },
      { no: "T-245", en: "The cost will be <strong>not less than</strong> 20,000 yen.", ja: "費用は少なくとも 2 万円にはなるだろう。", exp: "【重要】not less than [数] = at least。「少なくとも～」。" },
      { no: "T-246", en: "The cost will be <strong>at least</strong> 20,000 yen.", ja: "費用は少なくとも 2 万円にはなるだろう。", exp: "【言い換え】at least「少なくとも」。" },
      { no: "T-247", en: "The cost will be <strong>no less than</strong> 20,000 yen.", ja: "費用は 2 万円もするだろう。", exp: "【復習】no less than（多さの驚き）。" },
      { no: "T-248", en: "I feel <strong>happiest</strong> when I'm with my friends.", ja: "私は友達と一緒にいる時が一番幸せだ。", exp: "【省略】補語になる形容詞の最上級や、同一物内での比較は the を省略することが多い。" },
      { no: "T-249", en: "This lake is <strong>deepest</strong> here.", ja: "この湖はここが一番深い。", exp: "【重要】「この湖の他の地点と比べて」一番深い（同一物内）ので the は不要。" },
      { no: "T-250", en: "This lake is <strong>the deepest</strong> in Japan.", ja: "この湖は日本で一番深い。", exp: "【比較】「日本の他の湖と比べて」一番深いので the が必要。" },
      { no: "T-251", en: "The <strong>bravest</strong> people sometimes feel afraid.", ja: "最も勇敢な人々でさえ、時には恐怖を感じる。", exp: "【譲歩】「最も～な人でさえ」。" },
      { no: "T-252", en: "It will take <strong>at (the) most</strong> ten minutes to get there.", ja: "そこに着くにはせいぜい 10 分しかかからないだろう。", exp: "【定型】at (the) most「せいぜい、多くとも」。" },
      { no: "T-253", en: "It will take <strong>at (the) least</strong> three hours to get there.", ja: "そこに着くには少なくとも 3 時間はかかるだろう。", exp: "【定型】at (the) least「少なくとも」。" },
      { no: "T-254", en: "People are <strong>at their best</strong> under pressure.", ja: "人間はプレッシャー下にある時、最高の力を発揮する。", exp: "【定型】at one's best「最高の状態で」。" },
      { no: "T-255", en: "They can produce 30 cars a month <strong>at (the) best</strong>.", ja: "せいぜい（よくても）月に 30 台しか生産できない。", exp: "【定型】at best「よくても、せいぜい」。" },
      { no: "T-256", en: "Our team will get third prize, <strong>at (the) worst</strong>.", ja: "我がチームは最悪でも 3 位には入るだろう。", exp: "【定型】at worst「最悪でも」。" },
      { no: "T-257", en: "The new project will start in April <strong>at (the) earliest</strong>.", ja: "新しいプロジェクトは早くとも 4 月には始まる。", exp: "【定型】at earliest「早くとも」。" },
      { no: "T-258", en: "Be back by eight o'clock <strong>at the latest</strong>.", ja: "遅くとも 8 時までには戻ってきなさい。", exp: "【定型】at latest「遅くとも」。" }
    ];

    const container = document.getElementById('card-container');
    const finishBtn = document.querySelector('.btn-finish-study');

    data.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = `card-${index}`;
      card.onclick = (e) => {
        if (!e.target.classList.contains('btn-play-single')) {
            card.classList.toggle('open');
        }
      };
      
      card.innerHTML = `
        <div class="card-header">
          <span class="no">${item.no}</span>
          <button class="btn-play-single" onclick="playSingle(${index})">🔊 再生</button>
        </div>
        <div class="en-text">${item.en}</div>
        <div class="details">
            <span class="ja-text">${item.ja}</span>
            <div class="exp-box">${item.exp}</div>
        </div>
      `;
      // カードを完了ボタンの前に挿入
      container.insertBefore(card, finishBtn);
    });

    const synth = window.speechSynthesis;
    let currentPlayIndex = -1;
    let isPlayingAll = false;

    function stripHtml(html) {
      const tmp = document.createElement("DIV");
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || "";
    }

    function speakText(text, onEndCallback) {
      synth.cancel();
      const plainText = stripHtml(text);
      const utterance = new SpeechSynthesisUtterance(plainText);
      utterance.lang = 'en-US';
      utterance.rate = 0.85;
      utterance.onend = () => { if (onEndCallback) onEndCallback(); };
      synth.speak(utterance);
    }

    function updateHighlights(index) {
      document.querySelectorAll('.card').forEach((card, i) => {
        if (i === index) {
          card.classList.add('playing');
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
          card.classList.remove('playing');
        }
      });
    }

    function playNext() {
      if (!isPlayingAll) return;
      currentPlayIndex++;
      if (currentPlayIndex >= data.length) {
        stopAll();
        return;
      }
      updateHighlights(currentPlayIndex);
      speakText(data[currentPlayIndex].en, playNext);
    }

    function stopAll() {
      isPlayingAll = false;
      synth.cancel();
      updateHighlights(-1);
    }

    window.playSingle = function(index) {
      stopAll();
      updateHighlights(index);
      speakText(data[index].en);
    };

    document.getElementById('playAllBtn').addEventListener('click', () => {
      isPlayingAll = true;
      currentPlayIndex = -1;
      playNext();
    });

    document.getElementById('stopBtn').addEventListener('click', stopAll);

    // ==========================================
    // 追加：ポータルへデータを送信する処理
    // ==========================================
    function finishStudy() {
      if (typeof stopAll === 'function') stopAll(); // 再生機能があれば止める
      
      var sectionName = sessionStorage.getItem('gln_grammar_current_section') || '文法プリント 学習完了';
      
      var payload = {
        type:   'GLN_COMPLETE',
        title:  '文法プリント',
        cat:    'Grammar',
        detail: sectionName,
        words:  600,
        timestamp: Date.now()
      };

      if (window.opener && !window.opener.closed) {
        window.opener.postMessage(payload, '*');
      }
      try { 
        localStorage.setItem('GLN_SYNC_PAYLOAD', JSON.stringify(payload)); 
        localStorage.setItem('gln_grammar_result', JSON.stringify({
          section: sectionName,
          timestamp: Date.now()
        }));
      } catch(e) {}
      
      alert('「' + sectionName + '」の学習完了を記録しました！');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
