<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>助動詞完全マスター - 英文リスニング</title>
  <style>
    :root {
      --primary-color: #059669; /* 助動詞編は知的なグリーン */
      --accent-color: #f59e0b;
      --bg-color: #f0fdf4;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #475569;
      --radius: 16px;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding-top: 140px;
      line-height: 1.6;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      z-index: 1000;
      padding: 20px 0;
      text-align: center;
    }

    h1 {
      margin: 0 0 15px 0;
      font-size: 1.3rem;
      color: var(--primary-color);
      letter-spacing: 0.05em;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 15px;
    }

    button {
      border: none;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-play-all { background: var(--primary-color); color: white; }
    .btn-stop { background: #ef4444; color: white; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }

    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 0 15px 50px;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.playing {
      border-color: var(--primary-color);
      background-color: #f0fdf4;
      transform: scale(1.02);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .no {
      font-size: 0.8rem;
      color: #64748b;
      background: #f1f5f9;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .btn-play-single {
      background: #f1f5f9;
      color: var(--primary-color);
      padding: 6px 12px;
      font-size: 0.75rem;
    }

    .en-text {
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 10px;
      color: #0f172a;
    }

    .en-text strong {
      color: var(--primary-color);
      border-bottom: 2px solid #bbf7d0;
      font-weight: 700;
    }

    .details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      opacity: 0;
    }

    .card.open .details {
      max-height: 600px;
      opacity: 1;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed #e2e8f0;
    }

    .ja-text {
      font-size: 0.95rem;
      color: var(--text-sub);
      font-weight: bold;
      margin-bottom: 10px;
      display: block;
    }

    .exp-box {
      background: #f8fafc;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #475569;
      border-left: 4px solid var(--primary-color);
    }

    .hint-badge {
      font-size: 0.7rem;
      color: #94a3b8;
      text-align: center;
      display: block;
      margin-top: 5px;
    }

    /* 完了ボタン用スタイル */
    .btn-finish-study {
      background: #10b981;
      color: white;
      width: 100%;
      max-width: 300px;
      margin: 30px auto 0;
      padding: 16px;
      font-size: 1.1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      transition: opacity 0.2s;
    }
    .btn-finish-study:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <header>
    <h1>助動詞のまとめ (全102文)</h1>
    <div class="controls">
      <button class="btn-play-all" id="playAllBtn"><span>▶</span> 連続再生</button>
      <button class="btn-stop" id="stopBtn"><span>■</span> 停止</button>
    </div>
    <span class="hint-badge">カードをクリックして和訳・ポイントを確認</span>
  </header>

  <main class="container" id="card-container">
    <!-- 追加：完了ボタン -->
    <button class="btn-finish-study" onclick="finishStudy()">✓ 学習を完了する</button>
  </main>

  <script>
    const data =[
      { no: "T-047", en: "David <strong>can speak</strong> Japanese, but <strong>can't</strong> write it.", ja: "デイビッドは日本語を話せるが、書くことはできない。", exp: "【核】能力「～できる」。否定形 cannot (can't) は「能力がない」ことを表す。" },
      { no: "T-048", en: "I <strong>can see</strong> you tomorrow morning.", ja: "明日の朝ならお会いできます。", exp: "【核】可能性「（状況的に）～できる」。" },
      { no: "T-049", en: "You <strong>will be able to</strong> swim soon.", ja: "あなたはすぐに泳げるようになるでしょう。", exp: "【注意】助動詞 will と can は並べられないため、未来の能力は will be able to を使う。" },
      { no: "T-050", en: "She <strong>could</strong> [was able to] play the violin at five.", ja: "彼女は 5 歳でバイオリンを弾くことができた。", exp: "【過去の能力】過去の一般的な能力は could と be able to どちらでもOK。" },
      { no: "T-051", en: "I <strong>was able to</strong> swim 200 meters yesterday.", ja: "私は昨日、200 メートル泳ぐことができた。", exp: "【注意】「（その時実際に）～できた」という1回限りの達成は was able to を使う。could は不可。" },
      { no: "T-052", en: "You <strong>can enter</strong> if you have a ticket.", ja: "チケットを持っていれば入ってもよい。", exp: "【核】許可「～してもよい」。may より口語的。" },
      { no: "T-053", en: "You <strong>can't park</strong> your car here.", ja: "ここに車を駐車してはいけません。", exp: "【核】不許可「～してはいけない」。" },
      { no: "T-054", en: "<strong>Can I</strong> turn on the TV?", ja: "テレビをつけてもいいですか？", exp: "【核】許可を求める。丁寧にするなら Could I ～? / May I ～? を使う。" },
      { no: "T-055", en: "<strong>Can I have</strong> a newspaper?", ja: "新聞を頂けますか？", exp: "【定型】注文や依頼の定番。「～をいただけますか」。" },
      { no: "T-056", en: "<strong>Can you</strong> open the window?", ja: "窓を開けてくれませんか？", exp: "【核】依頼。カジュアルな表現。丁寧なら Could you ～?。" },
      { no: "T-057", en: "<strong>Could you possibly</strong> lend me another fifty dollars?", ja: "もう 50 ドル貸していただくことは可能でしょうか？", exp: "【最上級の丁寧】possibly（ひょっとして）を加えることで、さらに控えめな依頼になる。" },

      { no: "T-116", en: "You're <strong>not supposed to take</strong> pictures here.", ja: "ここで写真を撮ってはいけないことになっている。", exp: "【核】禁止事項。must not ほどきつくないが「ルールです」という響き。" },
      { no: "T-117", en: "You <strong>may have heard</strong> this joke before.", ja: "以前この冗談を聞いたことがあるかもしれません。", exp: "【重要】助動詞＋have＋p.p.。「過去の推量」。「～したかもしれない」。" },
      { no: "T-118", en: "The keys <strong>might have fallen</strong> out of my pocket.", ja: "ポケットから鍵が落ちたのかもしれない。", exp: "【核】may have よりさらに控えめな推測。" },
      { no: "T-119", en: "He <strong>could have left</strong> his umbrella at the store.", ja: "彼はお店に傘を忘れたのかもしれない。", exp: "【核】「～だったかもしれない」という可能性。" },
      { no: "T-120", en: "He <strong>must have told</strong> me a lie.", ja: "彼は私に嘘をついたに違いない。", exp: "【重要】過去の確信。「～したに違いない」。" },
      { no: "T-121", en: "The game <strong>should</strong> [ought to] <strong>have started</strong> at noon.", ja: "試合は正午に始まっていたはずだ。", exp: "【核】過去の推量。「（当然）～したはずだ」。" },
      { no: "T-122", en: "He <strong>cannot have accepted</strong> your plan.", ja: "彼があなたの計画を受け入れたはずがない。", exp: "【重要】過去の強い否定。「～したはずがない」。" },
      { no: "T-123", en: "She <strong>couldn't have noticed</strong> the difference.", ja: "彼女がその違いに気づいたはずがない。", exp: "【比較】cannot have とほぼ同じだが、より確信が強い。" },
      { no: "T-124", en: "You <strong>should have got up</strong> at seven.", ja: "あなたは 7 時に起きるべきだったのに。", exp: "【最重要】後悔・非難。「～すべきだったのに（実際はしなかった）」。" },
      { no: "T-125", en: "You <strong>needn't have bought</strong> so much meat.", ja: "そんなに肉を買う必要はなかったのに。", exp: "【最重要】「～する必要はなかったのに（実際はしてしまった）」。" },
      { no: "T-126", en: "You <strong>didn't need to come</strong>.", ja: "来る必要はなかったですね。", exp: "【比較】「必要がなかったので、しなかった」という過去の事実。125番との違いに注意。" },
      { no: "T-127", en: "I <strong>would like to join</strong> your team.", ja: "あなたのチームに入りたいのですが。", exp: "【丁寧】want to より丁寧な希望表現。" },
      { no: "T-128", en: "I <strong>would rather stay</strong> home.", ja: "どちらかと言えば家にいたい。", exp: "【核】「（消極的に）むしろ～したい」。" },
      { no: "T-129", en: "I <strong>would rather say nothing than</strong> tell a lie.", ja: "嘘をつくくらいなら何も言わないほうがいい。", exp: "【比較】would rather A than B。「BするよりむしろAしたい」。" },
      { no: "T-130", en: "I<strong>'d rather</strong> you <strong>didn't</strong>.", ja: "（できれば）そうしないでほしいのですが。", exp: "【注意】相手の申し出を丁寧に断る決まり文句。" },
      { no: "T-131", en: "She <strong>may well be</strong> tired after the trip.", ja: "旅行の後で彼女が疲れているのももっともだ。", exp: "【核】「～するのももっともだ」「たぶん～だろう」。" },
      { no: "T-132", en: "She <strong>might well complain</strong> about her boss.", ja: "彼女が上司の文句を言うのも当然だ。", exp: "【核】may well と同義。" },
      { no: "T-133", en: "You <strong>may well be</strong> angry with your brother.", ja: "弟さんに腹を立てるのももっともだ。", exp: "【慣用句】当然の感情を表す。" },
      { no: "T-134", en: "You <strong>might as well give up</strong>.", ja: "諦めたほうがいいのでは。", exp: "【核】「（他にする事もないし）～したほうがマシだ」。消極的な提案。" },
      { no: "T-135", en: "You <strong>may as well</strong> do it now <strong>as</strong> do it later.", ja: "後でやるくらいなら、今やったほうがいい。", exp: "【比較】may as well A as B。「BするくらいならAする方がマシだ」。" },
      { no: "T-136", en: "You <strong>might as well throw</strong> your money away <strong>as</strong> buy such a thing.", ja: "そんなものを買うなんて、金を捨てるようなものだ。", exp: "【核】「BするのはAするようなものだ」。" },
      { no: "T-137", en: "It is natural that he <strong>should like</strong> you.", ja: "彼があなたを好きになるのは当然だ。", exp: "【感情】It is natural/strange/surprising that ... should ～。「～するなんて」。" },
      { no: "T-138", en: "It is a pity that she <strong>has to leave</strong> this country.", ja: "彼女がこの国を去らなければならないのは残念だ。", exp: "【直説法】should を使わず事実として述べることも多い。" },
      { no: "T-139", en: "It is strange that they <strong>should have canceled</strong> the concert.", ja: "彼らがコンサートを中止したなんて不思議だ。", exp: "【過去】「～したなんて」は should have + p.p.。" },
      { no: "T-140", en: "It is necessary that you <strong>should take</strong> this medicine.", ja: "あなたはこの薬を飲む必要がある。", exp: "【必要】necessary/important などの後で義務的に使う should。" },
      { no: "T-141", en: "It is essential that you <strong>follow</strong> the doctor's advice.", ja: "医者の助言に従うことが不可欠だ。", exp: "【注意】米語では should が省略され動詞が原形（仮定法現在）になる。" },
      { no: "T-142", en: "I suggest that you [<strong>should</strong>] <strong>stay</strong> at the hotel.", ja: "そのホテルに泊まることを提案します。", exp: "【重要】suggest/propose などの that 節では should または原形を使う。" },
      { no: "T-143", en: "He insisted that I[<strong>should</strong>] <strong>come</strong> to the meeting.", ja: "彼は私が会議に来るようにと強く主張した。", exp: "【要求】insist（強く要求する）のパターン。" },
      { no: "T-144", en: "Why <strong>should</strong> anyone want to hurt you?", ja: "いったいなぜ誰かがあなたを傷つけようとするなんてことがあるのか？", exp: "【修辞疑問】「いったいなぜ～なのか」。驚きや意外性を強調。" },
      { no: "T-145", en: "Keep quiet <strong>lest</strong> you [<strong>should</strong>] <strong>wake</strong> the baby.", ja: "赤ちゃんを起こさないように静かにしていなさい。", exp: "【文語】lest ... should ～。「～しないように（目的）」。" },
      { no: "T-146", en: "I <strong>should say</strong> there were about 100 students in the hall.", ja: "ホールには 100 人くらいの学生がいたと思います。", exp: "【控えめ】「（ひょっとすると）～ではないかと思う」。断定を避ける響き。" }
    ];

    const container = document.getElementById('card-container');
    
    // 完了ボタンが一番下に来るように、ボタンの前にカードを挿入
    const finishBtn = document.querySelector('.btn-finish-study');

    data.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = `card-${index}`;
      card.onclick = (e) => {
        if (!e.target.classList.contains('btn-play-single')) {
            card.classList.toggle('open');
        }
      };
      
      // HTMLタグとして誤認されないようにエスケープ処理を追加
      const escapedExp = item.exp.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      
      card.innerHTML = `
        <div class="card-header">
          <span class="no">${item.no}</span>
          <button class="btn-play-single" onclick="playSingle(${index})">🔊 再生</button>
        </div>
        <div class="en-text">${item.en}</div>
        <div class="details">
            <span class="ja-text">${item.ja}</span>
            <div class="exp-box">${escapedExp}</div>
        </div>
      `;
      container.insertBefore(card, finishBtn);
    });

    const synth = window.speechSynthesis;
    let currentPlayIndex = -1;
    let isPlayingAll = false;

    function stripHtmlAndBrackets(html) {
      const tmp = document.createElement("DIV");
      tmp.innerHTML = html;
      let text = tmp.textContent || tmp.innerText || "";
      // [ ] で囲まれた部分は読み飛ばすか、シンプルにする処理
      return text.replace(/\[.*?\]/g, "");
    }

    function speakText(text, onEndCallback) {
      synth.cancel();
      const plainText = stripHtmlAndBrackets(text);
      const utterance = new SpeechSynthesisUtterance(plainText);
      utterance.lang = 'en-US';
      utterance.rate = 0.85;
      utterance.onend = () => { if (onEndCallback) onEndCallback(); };
      synth.speak(utterance);
    }

    function updateHighlights(index) {
      document.querySelectorAll('.card').forEach((card, i) => {
        if (i === index) {
          card.classList.add('playing');
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
          card.classList.remove('playing');
        }
      });
    }

    function playNext() {
      if (!isPlayingAll) return;
      currentPlayIndex++;
      if (currentPlayIndex >= data.length) {
        stopAll();
        return;
      }
      updateHighlights(currentPlayIndex);
      speakText(data[currentPlayIndex].en, playNext);
    }

    function stopAll() {
      isPlayingAll = false;
      synth.cancel();
      updateHighlights(-1);
    }

    window.playSingle = function(index) {
      stopAll();
      updateHighlights(index);
      speakText(data[index].en);
    };

    document.getElementById('playAllBtn').addEventListener('click', () => {
      isPlayingAll = true;
      currentPlayIndex = -1;
      playNext();
    });

    document.getElementById('stopBtn').addEventListener('click', stopAll);

    // ==========================================
    // 追加：ページ内の全単語数を計算する関数
    // ==========================================
    function calculateTotalWords() {
      let total = 0;
      data.forEach(item => {
        // HTMLタグ（<strong>など）を除去して純粋なテキストにする
        const plainText = item.en.replace(/<\/?[^>]+(>|$)/g, " ");
        // 空白で分割して単語数をカウント
        const words = plainText.trim().split(/\s+/);
        if (words[0] !== "") {
          total += words.length;
        }
      });
      return total;
    }

    // ==========================================
    // 修正：ポータルへデータを送信する処理
    // ==========================================
    function finishStudy() {
      if (typeof stopAll === 'function') stopAll(); 
      
      var sectionName = sessionStorage.getItem('gln_grammar_current_section') || '文法プリント 学習完了';
      
      // ★実際の単語数を動的に計算
      var actualWordCount = calculateTotalWords();
      
      var payload = {
        type:   'GLN_COMPLETE',
        title:  '文法プリント',
        cat:    'Grammar',
        detail: sectionName,
        words:  actualWordCount, // 固定値600から計算値に変更
        timestamp: Date.now()
      };

      if (window.opener && !window.opener.closed) {
        window.opener.postMessage(payload, '*');
      }
      try { 
        localStorage.setItem('GLN_SYNC_PAYLOAD', JSON.stringify(payload)); 
        localStorage.setItem('gln_grammar_result', JSON.stringify({
          section: sectionName,
          timestamp: Date.now()
        }));
      } catch(e) {}
      
      alert('「' + sectionName + '」の学習完了を記録しました！\n（カウント語数: ' + actualWordCount + '語）');
      window.location.href = 'index.html';
    }
  </script>
</body>
