<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>動名詞完全マスター - 英文リスニング</title>
  <style>
    :root {
      --primary-color: #e11d48; /* 動名詞編は情熱的なローズ（赤ピンク） */
      --accent-color: #f59e0b;
      --bg-color: #fff1f2;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #475569;
      --radius: 16px;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding-top: 160px;
      line-height: 1.6;
    }

    /* 固定ヘッダー */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      z-index: 1000;
      padding: 8px 0 12px;
      text-align: center;
    }

    h1 {
      margin: 0 0 15px 0;
      font-size: 1.3rem;
      color: var(--primary-color);
      letter-spacing: 0.05em;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 0 15px;
    }

    button {
      border: none;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-play-all { background: var(--primary-color); color: white; }
    .btn-stop { background: #ef4444; color: white; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }

    /* 速度・一時停止用スタイル */
    .speed-group { display: flex; gap: 5px; margin-bottom: 5px; }
    .btn-rate { background: #e2e8f0; color: #475569; padding: 6px 12px; font-size: 0.8rem; }
    .btn-rate.active { background: var(--primary-color); color: white; }
    .btn-pause { background: #f59e0b; color: white; }
    .btn-pause:disabled { background: #cbd5e1; cursor: not-allowed; }

    /* メインコンテンツ */
    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 0 15px 50px;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.playing {
      border-color: var(--primary-color);
      background-color: #fff1f2;
      transform: scale(1.02);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .no {
      font-size: 0.8rem;
      color: #9f1239;
      background: #ffe4e6;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .btn-play-single {
      background: #ffe4e6;
      color: var(--primary-color);
      padding: 6px 12px;
      font-size: 0.75rem;
    }

    .en-text {
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 10px;
      color: #0f172a;
    }

    .en-text strong {
      color: var(--primary-color);
      border-bottom: 2px solid #fecdd3;
      font-weight: 700;
    }

    .details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      opacity: 0;
    }

    .card.open .details {
      max-height: 600px;
      opacity: 1;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed #e2e8f0;
    }

    .ja-text {
      font-size: 0.95rem;
      color: var(--text-sub);
      font-weight: bold;
      margin-bottom: 10px;
      display: block;
    }

    .exp-box {
      background: #fffafa;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #475569;
      border-left: 4px solid var(--primary-color);
    }

    .hint-badge {
      font-size: 0.7rem;
      color: #94a3b8;
      text-align: center;
      display: block;
      margin-top: 5px;
    }

    .btn-finish-study {
      background: #10b981;
      color: white;
      width: 100%;
      max-width: 300px;
      margin: 30px auto 0;
      padding: 16px;
      font-size: 1.1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      transition: opacity 0.2s;
    }
    .btn-finish-study:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <header>
    <h1>動名詞のまとめ (全35文)</h1>
    <div class="controls">
      <div class="speed-group" id="speedGroup">
        <button class="btn-rate" data-rate="0.5">ゆっくり</button>
        <button class="btn-rate active" data-rate="0.6">標準(100w)</button>
        <button class="btn-rate" data-rate="0.8">自然</button>
        <button class="btn-rate" data-rate="1.0">速め</button>
      </div>
      <div style="display: flex; gap: 10px;">
        <button class="btn-play-all" id="playAllBtn"><span>▶</span> 連続再生</button>
        <button class="btn-pause" id="pauseBtn" disabled><span>⏸</span> 一時停止</button>
        <button class="btn-stop" id="stopBtn"><span>■</span> 停止</button>
      </div>
    </div>
    <span class="hint-badge">カードをクリックして和訳・ポイントを確認</span>
  </header>

  <main class="container" id="card-container">
    <button class="btn-finish-study" onclick="finishStudy()">✓ 学習を完了する</button>
  </main>

  <script>
    const data =[
      { no: "T-641", en: "My hobby is <strong>taking</strong> pictures.", ja: "私の趣味は写真を撮ることです。", exp: "【名詞的：補語】be動詞の後ろで主語の内容（趣味）を説明する。「～すること」。" },
      { no: "T-642", en: "<strong>Remembering</strong> people's names is difficult.", ja: "人の名前を覚えることは難しい。", exp: "【名詞的：主語】文頭で主語になる形。常に単数扱い。" },
      { no: "T-643", en: "It is enjoyable <strong>living</strong> by the sea.", ja: "海の近くで暮らすことは楽しい。", exp: "【形式主語】形式主語 It が動名詞を指す形。不定詞ほど一般的ではないが使われる。" },
      { no: "T-644", en: "My grandfather <strong>enjoys playing</strong> golf.", ja: "祖父はゴルフをして楽しむ。", exp: "【重要】動名詞のみを目的語にとる動詞（Megafeapsのひとつ）。" },
      { no: "T-645", en: "I found it comfortable <strong>lying</strong> on the grass.", ja: "芝生の上に寝転ぶのは心地よいとわかった。", exp: "【形式目的語】find it C ing。真目的語が後ろに置かれる形。" },
      { no: "T-646", en: "This shirt <strong>needs washing</strong>.", ja: "このシャツは洗う必要がある。", exp: "【重要：能動受動】need -ing で「～される必要がある」という受動の意味になる。" },
      { no: "T-647", en: "These shoes <strong>want polishing</strong>.", ja: "この靴は磨く必要がある。", exp: "【重要：能動受動】want -ing も need 同様「～される必要がある」の意味。" },
      { no: "T-648", en: "She is good <strong>at baking</strong> cookies.", ja: "彼女はクッキーを焼くのが上手だ。", exp: "【前置詞の目的語】前置詞の直後は必ず動名詞（名詞）がくる。" },
      { no: "T-649", en: "He left <strong>without saying</strong> good-bye.", ja: "彼はさよならも言わずに立ち去った。", exp: "【前置詞の目的語】without -ing で「～せずに」。" },
      { no: "T-650", en: "My brother doesn't like <strong>playing</strong> games.", ja: "弟はゲームをするのが好きではない。", exp: "【意味上の主語】不定詞と同様、文の主語と一致する場合は明示しない。" },
      { no: "T-651", en: "<strong>Seeing</strong> is <strong>believing</strong>.", ja: "百聞は一見に如かず（見ることは信じることだ）。", exp: "【一般論】意味上の主語が「誰でも」の場合は明示しない。" },
      { no: "T-652", en: "His hobby is <strong>collecting</strong> stamps.", ja: "彼の趣味は切手を集めることだ。", exp: "【文脈】文脈から明らかな場合も意味上の主語は示さない。" },
      { no: "T-653", en: "My brother doesn't like <strong>my playing</strong> games.", ja: "弟は私がゲームをするのを好まない。", exp: "【重要】意味上の主語。「所有格」または「目的格」を動名詞の直前に置く。" },
      { no: "T-654", en: "I can't stand <strong>him shouting</strong>.", ja: "私は彼が大声を出すのには我慢できない。", exp: "【重要】口語では目的格（him/meなど）が意味上の主語として好まれる。" },
      { no: "T-655", en: "I'm sure of <strong>our team winning</strong> the game.", ja: "私たちのチームが試合に勝つと確信している。", exp: "【名詞の主語】名詞を置く場合はそのままの形。所有格'sを付けることもある。" },
      { no: "T-656", en: "<strong>Not saying</strong> \"thank you\" is rude.", ja: "「ありがとう」と言わないのは失礼だ。", exp: "【否定】否定語 not は動名詞の直前に置く。" },
      { no: "T-657", en: "I believe in <strong>never telling</strong> lies.", ja: "私は嘘を一度もつかないことが大切だと信じている。", exp: "【否定】never を使って「決して～しないこと」と強調する。" },
      { no: "T-658", en: "I don't like <strong>being treated</strong> like a child.", ja: "私は子供扱いされるのが好きではない。", exp: "【受動態】being p.p. で「～されること」。" },
      { no: "T-659", en: "I don't like <strong>being spoken to</strong>.", ja: "私は話しかけられるのが好きではない。", exp: "【受動＋群動詞】spoken to by ... のように前置詞が並ぶ点に注意。" },
      { no: "T-660", en: "She is proud of <strong>having won</strong> a medal.", ja: "彼女はメダルを取ったことを誇りに思っている。", exp: "【完了形】having p.p.。「誇りに思う（現在）」より「前のこと（過去）」を表す。" },
      { no: "T-661", en: "He was proud of <strong>having passed</strong> the exam.", ja: "彼は試験に受かったことを誇りに思っていた。", exp: "【完了形：過去完了相当】「誇りに思っていた（過去）」より前のことを表す。" },
      { no: "T-662", en: "He <strong>remembered meeting</strong> her once before.", ja: "彼は以前一度彼女に会ったことを覚えていた。", exp: "【注意】remember -ing は完了形にしなくても「～したこと」と過去の意味になる。" },
      { no: "T-663", en: "The man <strong>admitted stealing</strong> her purse.", ja: "その男は彼女の財布を盗んだことを認めた。", exp: "【注意】admit -ing で「～したことを認める」。" },
      { no: "T-664", en: "The boy <strong>is used to making his own</strong> breakfast.", ja: "その少年は自分の朝食を作ることに慣れている。", exp: "【超重要】be used to -ing。この to は前置詞なので後ろは動名詞。" },
      { no: "T-665", en: "I'm <strong>looking forward to seeing</strong> you again.", ja: "またお会いできるのを楽しみにしています。", exp: "【超重要】look forward to -ing。「～することを楽しみに待つ」。" },
      { no: "T-666", en: "<strong>There is no knowing</strong> what will happen.", ja: "未来に何が起こるかは誰にもわからない。", exp: "【重要】There is no -ing。「～することはできない」。" },
      { no: "T-667", en: "<strong>It is no use worrying</strong> about the past.", ja: "過去のことをくよくよしても無駄だ。", exp: "【重要】It is no use -ing。「～しても無駄だ」。" },
      { no: "T-668", en: "Would you <strong>mind repeating</strong> that?", ja: "もう一度言っていただけませんか？", exp: "【重要】Would you mind -ing?。「～してくれませんか（嫌ですか）」。" },
      { no: "T-669", en: "Would you <strong>mind my sitting</strong> here?", ja: "ここに座ってもかまいませんか？", exp: "【重要】Would you mind my -ing?。「（私が）～してもよいですか」。" },
      { no: "T-670", en: "The doctors <strong>tried to keep the virus from spreading</strong>.", ja: "医師たちはウイルスが広がるのを防ごうとした。", exp: "【重要】keep O from -ing。「Oが～するのを防ぐ」。" },
      { no: "T-671", en: "The museum <strong>is worth visiting</strong>.", ja: "その博物館は訪れる価値がある。", exp: "【重要】be worth -ing。「～する価値がある」。" },
      { no: "T-672", en: "<strong>How about going</strong> for a swim?", ja: "泳ぎに行きませんか？", exp: "【定番】How about -ing?。「～するのはどうですか（提案）」。" },
      { no: "T-673", en: "Do you <strong>feel like having</strong> a drink?", ja: "一杯やりたい気分ですか？", exp: "【定番】feel like -ing。「～したい気分だ」。" },
      { no: "T-674", en: "<strong>On seeing</strong> the man's face, she panicked.", ja: "その男の顔を見るやいなや、彼女はパニックになった。", exp: "【重要】On -ing。「～するとすぐに」。" },
      { no: "T-675", en: "I slipped <strong>in getting off</strong> the train.", ja: "電車から降りる時に滑ってしまった。", exp: "【重要】In -ing。「～する時に／～している最中に」。" }
    ];

    const container = document.getElementById('card-container');
    const finishBtn = document.querySelector('.btn-finish-study');
    const playAllBtn = document.getElementById('playAllBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const speedBtns = document.querySelectorAll('.btn-rate');

    let currentRate = 0.6;
    let isPaused = false;
    let currentPlayIndex = -1;
    let isPlayingAll = false;
    const synth = window.speechSynthesis;

    // 速度選択イベント
    speedBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        speedBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentRate = parseFloat(btn.getAttribute('data-rate'));
      });
    });

    data.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = `card-${index}`;
      card.onclick = (e) => {
        if (!e.target.classList.contains('btn-play-single')) {
            card.classList.toggle('open');
        }
      };
      
      const escapedExp = item.exp.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      card.innerHTML = `
        <div class="card-header">
          <span class="no">${item.no}</span>
          <button class="btn-play-single" onclick="playSingle(${index})">🔊 再生</button>
        </div>
        <div class="en-text">${item.en}</div>
        <div class="details">
            <span class="ja-text">${item.ja}</span>
            <div class="exp-box">${escapedExp}</div>
        </div>
      `;
      container.insertBefore(card, finishBtn);
    });

    function stripHtml(html) {
      const tmp = document.createElement("DIV");
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || "";
    }

    function speakText(text, onEndCallback) {
      synth.cancel();
      const plainText = stripHtml(text);
      const utt = new SpeechSynthesisUtterance(plainText);
      utt.lang = 'en-US';
      utt.rate = currentRate;
      utt.onend = () => { if (onEndCallback) onEndCallback(); };
      synth.speak(utt);
    }

    function updateHighlights(index) {
      document.querySelectorAll('.card').forEach((card, i) => {
        if (i === index) {
          card.classList.add('playing');
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
          card.classList.remove('playing');
        }
      });
    }

    function togglePause() {
      if (!isPlayingAll) return;
      if (!isPaused) {
        isPaused = true;
        synth.cancel();
        pauseBtn.innerHTML = "<span>▶</span> 再開";
      } else {
        isPaused = false;
        pauseBtn.innerHTML = "<span>⏸</span> 一時停止";
        speakText(data[currentPlayIndex].en, playNext);
      }
    }

    pauseBtn.addEventListener('click', togglePause);

    function playNext() {
      if (!isPlayingAll || isPaused) return;
      currentPlayIndex++;
      if (currentPlayIndex >= data.length) {
        stopAll();
        return;
      }
      updateHighlights(currentPlayIndex);
      speakText(data[currentPlayIndex].en, playNext);
    }

    function stopAll() {
      isPlayingAll = false;
      isPaused = false;
      synth.cancel();
      updateHighlights(-1);
      pauseBtn.disabled = true;
      pauseBtn.innerHTML = "<span>⏸</span> 一時停止";
    }

    window.playSingle = function(index) {
      stopAll();
      updateHighlights(index);
      speakText(data[index].en);
    };

    playAllBtn.addEventListener('click', () => {
      isPlayingAll = true;
      isPaused = false;
      currentPlayIndex = -1;
      pauseBtn.disabled = false;
      playNext();
    });

    stopBtn.addEventListener('click', stopAll);

    function calculateTotalWords() {
      let total = 0;
      data.forEach(item => {
        const plainText = item.en.replace(/<\/?[^>]+(>|$)/g, " ");
        const words = plainText.trim().split(/\s+/);
        if (words[0] !== "") total += words.length;
      });
      return total;
    }

    function finishStudy() {
      stopAll();
      var sectionName = sessionStorage.getItem('gln_grammar_current_section') || '文法プリント 学習完了';
      var actualWordCount = calculateTotalWords();
      var payload = {
        type:   'GLN_COMPLETE',
        title:  '文法プリント',
        cat:    'Grammar',
        detail: sectionName,
        words:  actualWordCount,
        timestamp: Date.now()
      };
      if (window.opener && !window.opener.closed) { window.opener.postMessage(payload, '*'); }
      try { 
        localStorage.setItem('GLN_SYNC_PAYLOAD', JSON.stringify(payload)); 
        localStorage.setItem('gln_grammar_result', JSON.stringify({ section: sectionName, timestamp: Date.now() }));
      } catch(e) {}
      alert('「' + sectionName + '」の学習完了を記録しました！\n（カウント語数: ' + actualWordCount + '語）');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
